
<style>
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  .stack-frame{
    border:0.5px solid var(--color-border-secondary);
    border-radius:var(--border-radius-md);
    padding:10px 14px;
    margin:4px 0;
    font-size:13px;
    transition:all 0.35s ease;
    background:var(--color-background-primary);
    position:relative;
    overflow:hidden;
  }
  .stack-frame::before{
    content:'';
    position:absolute;left:0;top:0;bottom:0;width:3px;
    border-radius:2px 0 0 2px;
  }
  .frame-call::before{background:#534AB7}
  .frame-return::before{background:#0F6E56}
  .frame-base::before{background:#BA7517}
  .frame-label{font-weight:500;color:var(--color-text-primary);font-size:13px}
  .frame-sub{color:var(--color-text-secondary);font-size:12px;margin-top:2px}
  .frame-result{
    font-size:12px;margin-top:4px;
    color:var(--color-text-success);font-weight:500;
  }
  .badge{
    display:inline-block;font-size:11px;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;
  }
  .badge-call{background:var(--color-background-info);color:var(--color-text-info)}
  .badge-base{background:var(--color-background-warning);color:var(--color-text-warning)}
  .badge-return{background:var(--color-background-success);color:var(--color-text-success)}
  .ctrl-btn{
    padding:6px 14px;font-size:13px;border-radius:var(--border-radius-md);
    border:0.5px solid var(--color-border-secondary);
    background:var(--color-background-primary);
    color:var(--color-text-primary);cursor:pointer;transition:background 0.15s;
  }
  .ctrl-btn:hover{background:var(--color-background-secondary)}
  .ctrl-btn:disabled{opacity:0.35;cursor:default}
  .ctrl-btn.primary{
    background:var(--color-background-info);
    color:var(--color-text-info);
    border-color:var(--color-border-info);
  }
  #code-box{
    font-family:var(--font-mono);font-size:12px;line-height:1.7;
    background:var(--color-background-secondary);
    border:0.5px solid var(--color-border-tertiary);
    border-radius:var(--border-radius-md);
    padding:14px 16px;
    white-space:pre;
  }
  .hl{background:rgba(239,159,39,0.25);border-radius:2px;padding:0 2px}
  #step-info{
    font-size:13px;color:var(--color-text-secondary);
    border-left:3px solid var(--color-border-secondary);
    padding-left:10px;margin:10px 0;min-height:36px;
    transition:all 0.2s;
  }
  .legend-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
  select{
    font-size:13px;padding:5px 10px;
    border:0.5px solid var(--color-border-secondary);
    border-radius:var(--border-radius-md);
    background:var(--color-background-primary);
    color:var(--color-text-primary);cursor:pointer;
  }
</style>

<h2 class="sr-only">Visualizer đệ quy tương tác — xem từng bước call stack của hàm giai thừa hoặc Fibonacci</h2>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">

  <!-- Left: code + controls -->
  <div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <select id="mode-sel" onchange="reset()">
        <option value="fact">Giai thừa factorial(n)</option>
        <option value="fib">Fibonacci fib(n)</option>
      </select>
      <select id="n-sel" onchange="reset()">
        <option value="4">n = 4</option>
        <option value="5">n = 5</option>
        <option value="3">n = 3</option>
      </select>
    </div>
    <div id="code-box"></div>
    <div id="step-info">Nhấn ▶ để bắt đầu từng bước</div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <button class="ctrl-btn primary" id="btn-next" onclick="nextStep()">▶ Bước tiếp</button>
      <button class="ctrl-btn" id="btn-auto" onclick="toggleAuto()">⏩ Tự động</button>
      <button class="ctrl-btn" onclick="reset()">↺ Reset</button>
    </div>
    <div style="margin-top:12px;display:flex;gap:14px;font-size:12px;color:var(--color-text-secondary)">
      <span><span class="legend-dot" style="background:#534AB7"></span>Gọi hàm</span>
      <span><span class="legend-dot" style="background:#BA7517"></span>Base case</span>
      <span><span class="legend-dot" style="background:#0F6E56"></span>Trả về</span>
    </div>
  </div>

  <!-- Right: call stack -->
  <div>
    <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">
      Call Stack (LIFO)
    </div>
    <div id="stack-display" style="min-height:260px"></div>
    <div style="margin-top:12px;font-size:13px;padding:10px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)">
      <span style="color:var(--color-text-secondary)">Kết quả cuối:</span>
      <span id="final-result" style="font-weight:500;color:var(--color-text-primary);margin-left:8px">—</span>
    </div>
  </div>
</div>

<script>
const CODES = {
  fact: `def factorial(n):
    if n == 0:          # base case
        return 1
    return n * factorial(n - 1)`,
  fib: `def fib(n):
    if n <= 1:          # base case
        return n
    return fib(n-1) + fib(n-2)`
};

// Build steps for factorial
function buildFactSteps(n) {
  const steps = [];
  function fact(k, depth) {
    steps.push({type:'call', label:`factorial(${k})`, sub:`n = ${k}`, depth, line:0});
    if (k === 0) {
      steps.push({type:'base', label:`factorial(0)`, sub:`n == 0 → return 1`, depth, line:1, val:1});
      return 1;
    }
    const sub = fact(k-1, depth+1);
    const val = k * sub;
    steps.push({type:'return', label:`factorial(${k})`, sub:`return ${k} × ${sub} = ${val}`, depth, line:3, val});
    return val;
  }
  fact(n, 0);
  return steps;
}

// Build steps for fib (simplified — only goes depth 3 for n<=5)
function buildFibSteps(n) {
  const steps = [];
  const memo = {};
  function fib(k, depth) {
    if (depth > 6) return 0; // cap for display
    steps.push({type:'call', label:`fib(${k})`, sub:`n = ${k}`, depth, line:0});
    if (k <= 1) {
      steps.push({type:'base', label:`fib(${k})`, sub:`n <= 1 → return ${k}`, depth, line:1, val:k});
      return k;
    }
    const a = fib(k-1, depth+1);
    const b = fib(k-2, depth+1);
    const val = a + b;
    steps.push({type:'return', label:`fib(${k})`, sub:`return fib(${k-1})+fib(${k-2}) = ${a}+${b} = ${val}`, depth, line:3, val});
    return val;
  }
  fib(n, 0);
  return steps;
}

const INFO = {
  call: 'Python đẩy frame mới vào call stack — hàm chưa trả về.',
  base: '🛑 Base case! Đây là điểm dừng — không gọi đệ quy nữa, trả về trực tiếp.',
  return: '↩ Frame bị pop ra khỏi stack — kết quả được trả về cho frame cha.'
};

let steps = [], idx = 0, timer = null;
const stack = []; // live stack of active frames

function getMode() { return document.getElementById('mode-sel').value; }
function getN() { return parseInt(document.getElementById('n-sel').value); }

function renderCode(step) {
  const raw = CODES[getMode()];
  const lines = raw.split('\n');
  if (!step) {
    document.getElementById('code-box').innerHTML = lines.map(l => escHtml(l)).join('\n');
    return;
  }
  document.getElementById('code-box').innerHTML = lines.map((l,i) =>
    i === step.line ? `<span class="hl">${escHtml(l)}</span>` : escHtml(l)
  ).join('\n');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderStack() {
  const el = document.getElementById('stack-display');
  if (stack.length === 0) { el.innerHTML = '<div style="color:var(--color-text-secondary);font-size:13px;padding:12px 0">Stack trống</div>'; return; }
  // Render top of stack at top (visual stack)
  el.innerHTML = [...stack].reverse().map(f => {
    const cls = f.type === 'base' ? 'frame-base' : f.type === 'return' ? 'frame-return' : 'frame-call';
    const badge = f.type === 'base' ? '<span class="badge badge-base">base</span>' : f.type === 'return' ? '<span class="badge badge-return">return</span>' : '<span class="badge badge-call">call</span>';
    const resultHtml = f.val !== undefined ? `<div class="frame-result">→ ${f.val}</div>` : '';
    const indent = f.depth > 0 ? `margin-left:${Math.min(f.depth*8,40)}px` : '';
    return `<div class="stack-frame ${cls}" style="${indent}">
      <div class="frame-label">${escHtml(f.label)}${badge}</div>
      <div class="frame-sub">${escHtml(f.sub)}</div>
      ${resultHtml}
    </div>`;
  }).join('');
}

function reset() {
  clearInterval(timer); timer = null;
  document.getElementById('btn-auto').textContent = '⏩ Tự động';
  const n = getN(), mode = getMode();
  steps = mode === 'fact' ? buildFactSteps(n) : buildFibSteps(n);
  idx = 0; stack.length = 0;
  renderCode(null);
  renderStack();
  document.getElementById('step-info').textContent = 'Nhấn ▶ để bắt đầu từng bước';
  document.getElementById('final-result').textContent = '—';
  document.getElementById('btn-next').disabled = false;
}

function nextStep() {
  if (idx >= steps.length) return;
  const step = steps[idx++];
  renderCode(step);
  document.getElementById('step-info').textContent = INFO[step.type] || '';

  if (step.type === 'call') {
    stack.push({...step});
  } else if (step.type === 'base') {
    // mark top of stack
    if (stack.length > 0) { stack[stack.length-1].type = 'base'; stack[stack.length-1].val = step.val; stack[stack.length-1].sub = step.sub; }
    setTimeout(() => { stack.pop(); renderStack(); }, 500);
  } else if (step.type === 'return') {
    if (stack.length > 0) { stack[stack.length-1].type = 'return'; stack[stack.length-1].val = step.val; stack[stack.length-1].sub = step.sub; }
    setTimeout(() => { stack.pop(); renderStack(); }, 500);
    if (idx === steps.length) {
      document.getElementById('final-result').textContent = step.val;
    }
  }
  renderStack();
  if (idx >= steps.length) document.getElementById('btn-next').disabled = true;
}

function toggleAuto() {
  if (timer) {
    clearInterval(timer); timer = null;
    document.getElementById('btn-auto').textContent = '⏩ Tự động';
  } else {
    document.getElementById('btn-auto').textContent = '⏸ Dừng';
    timer = setInterval(() => {
      if (idx >= steps.length) { clearInterval(timer); timer = null; document.getElementById('btn-auto').textContent = '⏩ Tự động'; return; }
      nextStep();
    }, 900);
  }
}

reset();
</script>
